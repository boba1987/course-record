volumes:
  mysql_data:

services:
  mysql:
    image: mysql:8.4
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      MYSQL_DATABASE: course_record
      MYSQL_USER: course_record
      MYSQL_PASSWORD: course_record_dev
      MYSQL_ROOT_PASSWORD: root_course_record_dev
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_course_record_dev"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s
    # No host port: DB is only reachable from the backend container on the compose network.

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/course_record?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: course_record
      SPRING_DATASOURCE_PASSWORD: course_record_dev
      JWT_SECRET: dev-docker-only-change-me-use-32bytes-minimum-secret-key
      APP_ADMIN_USERNAME: admin
      APP_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
